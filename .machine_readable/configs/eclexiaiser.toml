# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: MPL-2.0

[project]
name = "rsr-template-repo"

[[functions]]
name = "build"
source = "src/interface/ffi/build.zig"
energy-budget-mj = 15.0
carbon-budget-mg = 3.0

[[functions]]
name = "setError"
source = "src/interface/ffi/src/main.zig"
energy-budget-mj = 5.0
carbon-budget-mg = 1.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
