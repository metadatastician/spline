[tools]
# Language runtimes
node = "latest"
python = "latest"
rust = "latest"
go = "latest"
zig = "latest"
java = "latest"
bun = "latest"
denojs = "latest"

# Package managers
npm = "latest"
yarn = "latest"
pnpm = "latest"
pip = "latest"
cargo = "latest"
go-task = "latest"

# Formatting & Linting
gofmt = "latest"
black = "latest"
isort = "latest"
ruff = "latest"
prettier = "latest"
shfmt = "latest"
stylua = "latest"

# Build tools
cmake = "latest"
make = "latest"
ninja = "latest"

# Shell tools
git = "latest"
gnu-sed = "latest"
gnu-tar = "latest"
gnu-grep = "latest"

# Testing
vitest = "latest"
pytest = "latest"
jest = "latest"

[env]
# Common environment variables
NODE_ENV = "development"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

# Task runner alias
[alias]
task = "go-task"
build = "cargo build --release || npm run build || go build"
test = "cargo test || npm test || go test ./..."
lint = "ruff check . || prettier --check . || black --check ."
fmt = "ruff format . || prettier --write . || black ."
